services:
  - type: web
    name: pharmacovigilance-pipeline
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: OPENFDA_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
