<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Pharmacovigilance Dashboard{% endblock %}</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #f8f9fb; color: #1a1a2e; }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 0; left: 0; height: 100vh; width: 220px;
      background: #1e1b4b; color: #e0e7ff; padding: 24px 16px;
      overflow-y: auto; z-index: 10;
    }
    .sidebar h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .1em;
                  color: #a5b4fc; margin-bottom: 20px; }
    .sidebar a { display: block; padding: 8px 12px; border-radius: 6px;
                 color: #c7d2fe; text-decoration: none; font-size: 14px; margin-bottom: 4px; }
    .sidebar a:hover, .sidebar a.active { background: #312e81; color: #fff; }
    .sidebar .brand { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 28px; }

    /* Main content */
    .main { margin-left: 220px; padding: 32px; }
    .page-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .page-sub   { color: #6b7280; font-size: 14px; margin-bottom: 28px; }

    /* KPI cards */
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
               gap: 16px; margin-bottom: 28px; }
    .kpi-card { background: #fff; border-radius: 12px; padding: 20px;
                border: 1px solid #e5e7eb; }
    .kpi-card .label { font-size: 12px; color: #6b7280; text-transform: uppercase;
                       letter-spacing: .06em; margin-bottom: 8px; }
    .kpi-card .value { font-size: 28px; font-weight: 700; color: #4f46e5; }
    .kpi-card .sub   { font-size: 12px; color: #9ca3af; margin-top: 4px; }

    /* Chart cards */
    .chart-card { background: #fff; border-radius: 12px; padding: 20px;
                  border: 1px solid #e5e7eb; margin-bottom: 24px; }
    .chart-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }

    @media (max-width: 900px) {
      .sidebar { width: 100%; height: auto; position: relative; }
      .main { margin-left: 0; }
      .chart-grid-2 { grid-template-columns: 1fr; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
<nav class="sidebar">
  <div class="brand">⚕ PharmaVigil</div>
  <h2>Overview</h2>
  <a href="/" {% if request.path == '/' %}class="active"{% endif %}>All drugs</a>
  <h2 style="margin-top:20px">By drug</h2>
  {% for d in drugs %}
  <a href="/drug/{{ d }}"
     {% if request.path == '/drug/' ~ d %}class="active"{% endif %}>
    {{ drug_labels[d].split('(')[0].strip() }}
  </a>
  {% endfor %}
</nav>

<main class="main">
  {% block content %}{% endblock %}
</main>

<script>
function renderChart(divId, jsonStr) {
  if (!jsonStr || jsonStr === '{}') {
    document.getElementById(divId).innerHTML =
      '<p style="color:#9ca3af;padding:20px">No data available yet — run the ETL pipeline first.</p>';
    return;
  }
  const fig = JSON.parse(jsonStr);
  Plotly.newPlot(divId, fig.data, fig.layout, {responsive: true, displayModeBar: false});
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
