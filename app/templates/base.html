<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Pharmacovigilance Dashboard{% endblock %}</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0e17;
      --surface:  #111827;
      --surface2: #1a2235;
      --border:   #1e2d45;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --accent:   #00d4aa;
      --warn:     #f59e0b;
      --danger:   #ef4444;
      --info:     #3b82f6;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    /* ── Layout ─────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 210px 1fr;
      min-height: 100vh;
    }

    /* ── Sidebar ─────────────────────────────── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-brand {
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .sidebar-brand .logo {
      font-size: 10px;
      letter-spacing: .15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .sidebar-brand .name {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -.02em;
    }

    .nav-label {
      font-size: 10px;
      letter-spacing: .12em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 0 20px;
      margin: 14px 0 6px;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      border-left: 2px solid transparent;
      transition: all .15s;
    }

    .sidebar a:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .sidebar a.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(0, 212, 170, .06);
    }

    .nav-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    /* ── Main content ─────────────────────────── */
    .main { padding: 32px; }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -.03em;
      margin-bottom: 4px;
    }

    .page-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      background: rgba(0, 212, 170, .08);
      color: var(--accent);
      border: 1px solid rgba(0, 212, 170, .2);
    }

    .live-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .25; }
    }

    /* ── KPI cards ─────────────────────────────── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 16px;
      position: relative;
      overflow: hidden;
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .kpi-card.k-teal::before  { background: var(--accent); }
    .kpi-card.k-amber::before { background: var(--warn); }
    .kpi-card.k-red::before   { background: var(--danger); }
    .kpi-card.k-blue::before  { background: var(--info); }

    .kpi-card .label {
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .kpi-card .value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -.03em;
      font-family: 'DM Mono', monospace;
    }

    .kpi-card.k-teal  .value { color: var(--accent); }
    .kpi-card.k-amber .value { color: var(--warn); }
    .kpi-card.k-red   .value { color: var(--danger); }
    .kpi-card.k-blue  .value { color: var(--info); }

    .kpi-card .sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
    }

    /* ── Chart cards ─────────────────────────────── */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .chart-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    /* ── Plotly overrides ─────────────────────── */
    .js-plotly-plot .plotly .bg { fill: transparent !important; }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; }
      .chart-grid-2 { grid-template-columns: 1fr; }
      .kpi-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
<div class="layout">
<nav class="sidebar">
  <div class="sidebar-brand">
    <div class="logo">Pharmacovigilance</div>
    <div class="name">SignalDB</div>
  </div>

  <div class="nav-label">Overview</div>
  <a href="/" {% if request.path == '/' %}class="active"{% endif %}>
    <span class="nav-dot"></span>All drugs
  </a>

  <div class="sidebar-divider"></div>
  <div class="nav-label">By drug</div>
  {% for d in drugs %}
  <a href="/drug/{{ d }}"
     {% if request.path == '/drug/' ~ d %}class="active"{% endif %}>
    <span class="nav-dot"></span>
    {{ drug_labels[d].split('(')[0].strip() }}
  </a>
  {% endfor %}

  <div class="sidebar-divider"></div>
  <div class="nav-label">Data</div>
  <a href="/api/data/adderall" target="_blank">
    <span class="nav-dot"></span>JSON API
  </a>
</nav>

<main class="main">
  {% block content %}{% endblock %}
</main>
</div>

<script>
function renderChart(divId, jsonStr) {
  if (!jsonStr || jsonStr === '{}') {
    document.getElementById(divId).innerHTML =
      '<p style="color:var(--muted);padding:20px;font-size:13px">No data — run the ETL pipeline first.</p>';
    return;
  }
  const fig = JSON.parse(jsonStr);

  const darkLayout = {
    paper_bgcolor: 'transparent',
    plot_bgcolor:  'transparent',
    font:          { color: '#e2e8f0', family: 'DM Mono, monospace', size: 12 },
    xaxis:         { gridcolor: '#1e2d45', linecolor: '#1e2d45', zerolinecolor: '#1e2d45' },
    yaxis:         { gridcolor: '#1e2d45', linecolor: '#1e2d45', zerolinecolor: '#1e2d45' },
    legend:        { bgcolor: 'transparent' },
  };

  fig.layout = Object.assign({}, fig.layout, darkLayout);
  if (fig.layout.xaxis) fig.layout.xaxis = Object.assign({}, darkLayout.xaxis, fig.layout.xaxis, { gridcolor: '#1e2d45', linecolor: '#1e2d45' });
  if (fig.layout.yaxis) fig.layout.yaxis = Object.assign({}, darkLayout.yaxis, fig.layout.yaxis, { gridcolor: '#1e2d45', linecolor: '#1e2d45' });

  Plotly.newPlot(divId, fig.data, fig.layout, { responsive: true, displayModeBar: false });
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
