<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Pharmacovigilance Dashboard{% endblock %}</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #120a0e;
      --surface:  #1a0e14;
      --surface2: #22131a;
      --border:   rgba(255,180,210,0.08);
      --border-solid: #3a1a28;
      --text:     #f5e6ed;
      --muted:    #9c7a88;
      --accent:   #ff6eb0;
      --accent2:  #ffb3d1;
      --warn:     #ffb347;
      --danger:   #ff4f4f;
      --info:     #b3d1ff;
      --card-bg:  rgba(255,110,176,0.03);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      font-weight: 300;
    }

    /* ── Noise texture overlay ───────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── Layout ─────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ── Sidebar ─────────────────────────────── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-brand {
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .sidebar-brand .logo {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .sidebar-brand .name {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
      font-style: italic;
    }

    .nav-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 0 20px;
      margin: 16px 0 6px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .nav-label::before {
      content: '';
      width: 1rem;
      height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      text-decoration: none;
      border-left: 2px solid transparent;
      transition: all 0.15s;
    }

    .sidebar a:hover {
      color: var(--text);
      background: rgba(255,110,176,0.04);
    }

    .sidebar a.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(255,110,176,0.06);
    }

    .nav-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    /* ── Main content ─────────────────────────── */
    .main { padding: 36px 32px; }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .page-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .page-label::before {
      content: '';
      width: 1.5rem;
      height: 1px;
      background: var(--accent);
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .page-sub {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.08em;
      background: rgba(255,110,176,0.08);
      color: var(--accent);
      border: 1px solid rgba(255,110,176,0.25);
    }

    .live-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ── KPI cards ─────────────────────────────── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .kpi-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 16px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
    }

    .kpi-card:hover {
      border-color: rgba(255,110,176,0.25);
      background: rgba(255,110,176,0.05);
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .kpi-card.k-pink::before  { background: var(--accent); }
    .kpi-card.k-amber::before { background: var(--warn); }
    .kpi-card.k-red::before   { background: var(--danger); }
    .kpi-card.k-soft::before  { background: var(--accent2); }

    .kpi-card .label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .kpi-card .value {
      font-family: 'DM Mono', monospace;
      font-size: 1.8rem;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .kpi-card.k-pink  .value { color: var(--accent); }
    .kpi-card.k-amber .value { color: var(--warn); }
    .kpi-card.k-red   .value { color: var(--danger); }
    .kpi-card.k-soft  .value { color: var(--accent2); }

    .kpi-card .sub {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 5px;
      line-height: 1.5;
    }

    /* ── Chart cards ─────────────────────────────── */
    .chart-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .chart-card:hover {
      border-color: rgba(255,110,176,0.2);
    }

    .chart-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .chart-title::before {
      content: '';
      width: 0.8rem;
      height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }

    .chart-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    /* ── Table styles ─────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
    }

    th {
      text-align: left;
      padding: 8px 12px;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    tr:hover td {
      background: rgba(255,110,176,0.03);
    }

    /* ── Pill badges ─────────────────────────── */
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.06em;
    }

    .pill-pink   { background: rgba(255,110,176,0.12); color: var(--accent); }
    .pill-amber  { background: rgba(255,179,71,0.12);  color: var(--warn); }
    .pill-red    { background: rgba(255,79,79,0.12);   color: var(--danger); }
    .pill-soft   { background: rgba(255,179,209,0.1);  color: var(--accent2); }

    /* ── Plotly overrides ─────────────────────── */
    .js-plotly-plot .plotly .bg { fill: transparent !important; }

    /* ── Scrollbar ───────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-solid); border-radius: 2px; }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; }
      .chart-grid-2 { grid-template-columns: 1fr; }
      .kpi-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
<div class="layout">
<nav class="sidebar">
  <div class="sidebar-brand">
    <div class="logo">Pharmacovigilance</div>
    <div class="name">SignalDB</div>
  </div>

  <div class="nav-label">Overview</div>
  <a href="/" {% if request.path == '/' %}class="active"{% endif %}>
    <span class="nav-dot"></span>All drugs
  </a>

  <div class="sidebar-divider"></div>
  <div class="nav-label">By drug</div>
  {% for d in drugs %}
  <a href="/drug/{{ d }}"
     {% if request.path == '/drug/' ~ d %}class="active"{% endif %}>
    <span class="nav-dot"></span>
    {{ drug_labels[d].split('(')[0].strip() }}
  </a>
  {% endfor %}

  <div class="sidebar-divider"></div>
  <div class="nav-label">Data</div>
  <a href="/api/data/adderall" target="_blank">
    <span class="nav-dot"></span>JSON API
  </a>
</nav>

<main class="main">
  {% block content %}{% endblock %}
</main>
</div>

<script>
function renderChart(divId, jsonStr) {
  if (!jsonStr || jsonStr === '{}') {
    document.getElementById(divId).innerHTML =
      '<p style="color:var(--muted);padding:20px;font-size:13px;font-family:\'DM Mono\',monospace;">No data — run the ETL pipeline first.</p>';
    return;
  }
  const fig = JSON.parse(jsonStr);

  const darkLayout = {
    paper_bgcolor: 'transparent',
    plot_bgcolor:  'transparent',
    font:          { color: '#f5e6ed', family: 'DM Mono, monospace', size: 11 },
    xaxis:         { gridcolor: 'rgba(255,180,210,0.08)', linecolor: 'rgba(255,180,210,0.08)', zerolinecolor: 'rgba(255,180,210,0.08)', tickfont: { color: '#9c7a88' } },
    yaxis:         { gridcolor: 'rgba(255,180,210,0.08)', linecolor: 'rgba(255,180,210,0.08)', zerolinecolor: 'rgba(255,180,210,0.08)', tickfont: { color: '#9c7a88' } },
    legend:        { bgcolor: 'transparent', font: { color: '#9c7a88' } },
    colorway:      ['#ff6eb0', '#ffb3d1', '#ff9ecc', '#ff4fa0', '#ffcce5', '#e05090'],
  };

  fig.layout = Object.assign({}, fig.layout, darkLayout);
  if (fig.layout.xaxis) fig.layout.xaxis = Object.assign({}, darkLayout.xaxis, fig.layout.xaxis, { gridcolor: 'rgba(255,180,210,0.08)', linecolor: 'rgba(255,180,210,0.08)' });
  if (fig.layout.yaxis) fig.layout.yaxis = Object.assign({}, darkLayout.yaxis, fig.layout.yaxis, { gridcolor: 'rgba(255,180,210,0.08)', linecolor: 'rgba(255,180,210,0.08)' });

  Plotly.newPlot(divId, fig.data, fig.layout, { responsive: true, displayModeBar: false });
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
